<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e3a8a">
    <title>Pediatric Clinical Hub</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8;
            --accent: #0ea5e9; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;        
            --bg-body: #f8fafc; --bg-surface: #ffffff;
            --text-main: #334155; --text-muted: #64748b; --border-soft: #e2e8f0;
            --radius-lg: 16px; --radius-md: 10px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        body.dark-mode {
            --bg-body: #0f172a; --bg-surface: #1e293b; --text-main: #f8fafc;
            --text-muted: #94a3b8; --border-soft: #334155; --primary-light: #1e3a8a; --primary: #3b82f6;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background-color: var(--bg-body); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: background-color 0.3s, color 0.3s;}
        
        header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 1.25rem; text-align: center; box-shadow: var(--shadow-md); z-index: 10; position: relative; flex-shrink: 0;}
        header h1 { margin: 0 0 5px 0; font-size: 1.6rem; font-weight: 700;}
        header p { margin: 0; opacity: 0.85; font-size: 0.9rem; font-weight: 400; }
        
        .app-shell { display: grid; grid-template-columns: 320px 1fr; flex: 1; max-width: 1600px; width: 100%; margin: 0 auto; box-sizing: border-box; overflow: hidden; }
        .sidebar { background: var(--bg-surface); border-right: 1px solid var(--border-soft); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; height: 100%; overflow-y: auto; transition: background-color 0.3s, border-color 0.3s;}
        
        .app-features-nav { display: flex; flex-direction: column; gap: 0.35rem; border-bottom: 1px solid var(--border-soft); padding-bottom: 1rem; flex-shrink: 0;}
        .feature-btn { background: transparent; color: var(--text-muted); border: none; padding: 0.75rem 1rem; border-radius: var(--radius-md); font-size: 0.95rem; font-weight: 600; cursor: pointer; text-align: left; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px;}
        .feature-btn:hover { background: var(--border-soft); color: var(--text-main); }
        .feature-btn.active { background: var(--primary-light); color: var(--primary); font-weight: 700; }
        .feature-btn.special { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .feature-btn.alert { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2);}
        .feature-btn.alert.active { background: var(--danger); color: white; border: none;}

        .panel { background: var(--bg-surface); padding: 0; border-radius: var(--radius-lg); border: none; transition: background-color 0.3s; flex: 1; display: flex; flex-direction: column;}
        .panel-scroll { overflow-y: auto; flex: 1; padding-right: 5px; }
        
        label { display: block; font-weight: 600; margin: 0.75rem 0 0.25rem 0; font-size: 0.85rem; color: var(--text-main); }
        input, select { width: 100%; padding: 0.65rem 0.8rem; border: 1px solid var(--border-soft); border-radius: var(--radius-md); box-sizing: border-box; font-size: 0.95rem; transition: all 0.2s; background: var(--bg-body); color: var(--text-main); font-family: inherit;}
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); background: var(--bg-surface);}
        .row-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

        button.action { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 0.85rem; font-size: 0.95rem; font-weight: 600; border-radius: var(--radius-md); cursor: pointer; margin-top: 1rem; transition: transform 0.1s, box-shadow 0.2s; box-shadow: var(--shadow-sm); flex-shrink: 0;}
        button.action:active { transform: translateY(1px); }
        button.secondary { background-color: var(--bg-body); color: var(--text-main); border: 1px solid var(--border-soft); padding: 0.6rem 0.8rem; border-radius: var(--radius-md); cursor: pointer; font-weight: 600; transition: all 0.2s;}
        button.whatsapp-btn { background: linear-gradient(135deg, #25D366, #128C7E); color: white; padding: 0.75rem 1rem; border-radius: var(--radius-md); font-weight: 600; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 0.5rem; box-shadow: var(--shadow-sm);}
        button.print-master { background: var(--text-main); color: var(--bg-surface); padding: 0.85rem; border-radius: var(--radius-md); font-weight: 600; width: 100%; border: none; cursor: pointer; margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px;}

        .patient-list { margin-top: 1rem; border-top: 1px solid var(--border-soft); padding-top: 1rem; }
        .patient-badge { background: var(--bg-surface); padding: 0.75rem 1rem; border-radius: var(--radius-md); margin-bottom: 0.5rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; border: 1px solid var(--border-soft); transition: all 0.2s; box-shadow: var(--shadow-sm);}
        .patient-badge.active-patient { border-color: var(--primary); background: var(--primary-light); font-weight: 600; box-shadow: 0 0 0 1px var(--primary); color: var(--primary-dark);}

        .main-content { flex: 1; padding: 2rem; overflow-y: auto; background: var(--bg-body); transition: background-color 0.3s; position: relative;}
        .view-content { display: none; max-width: 1000px; margin: 0 auto; animation: fadeSlideIn 0.3s ease-out forwards; }
        .view-content.active-view { display: block; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .sub-tabs-nav { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border-soft); flex-wrap: wrap; }
        .sub-tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 0.75rem 1.25rem; cursor: pointer; font-size: 0.95rem; font-weight: 600; border-radius: var(--radius-md) var(--radius-md) 0 0; white-space: nowrap; transition: color 0.2s; position: relative; bottom: -2px;}
        .sub-tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); background: transparent; }
        .sub-tab-content { display: none; animation: fadeSlideIn 0.2s ease-out forwards; }
        .sub-tab-content.active { display: block; }

        .timeline-section { background: var(--bg-surface); padding: 1.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); margin-bottom: 1.5rem; border: 1px solid var(--border-soft); transition: background-color 0.3s;}
        .section-title { color: var(--primary); border-bottom: 1px solid var(--border-soft); padding-bottom: 0.5rem; margin-top: 0; margin-bottom: 1rem; font-size: 1.1rem; font-weight: 700;}

        .chart-card-wrapper { background: var(--bg-surface); padding: 1rem; border-radius: var(--radius-lg); border: 1px solid var(--border-soft); min-height: 320px; box-shadow: var(--shadow-sm);}
        .vaccine-row { display: grid; grid-template-columns: 1.8fr 1fr 1.5fr; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border-soft); gap: 1rem; transition: background 0.2s;}
        body:not(.dark-mode) .vaccine-row:hover { background: rgba(0,0,0,0.02); border-radius: 8px; padding-left: 10px; padding-right: 10px; margin-left: -10px; margin-right: -10px;}
        .vaccine-row:last-child { border-bottom: none; }
        .vaccine-info h4 { margin: 0 0 0.25rem 0; font-size: 1rem; color: var(--text-main);}
        .vaccine-meta { font-size: 0.8rem; color: var(--text-muted); }
        .action-protocol-card { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); padding: 0.4rem 0.6rem; border-radius: 6px; font-size: 0.75rem; color: var(--warning); display: inline-block; margin-top: 5px;}
        .date-display-box { font-size: 0.95rem; font-weight: 700; color: var(--primary); }
        .date-picker-cell { text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 12px;}
        .tick-box { width: 20px; height: 20px; cursor: pointer; accent-color: var(--success); border-radius: 4px;}

        .formula-box { background: rgba(37,99,235,0.05); padding: 1rem; border-radius: var(--radius-md); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; border-left: 4px solid var(--primary); color: var(--text-main);}
        .calc-control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; background: var(--primary-light); padding: 1rem; border-radius: var(--radius-lg); border: 1px solid var(--primary); margin-bottom: 1.5rem; }
        .result-card { background: var(--bg-surface); border: 2px solid var(--success); padding: 1.5rem; border-radius: var(--radius-lg); text-align: center; box-shadow: var(--shadow-sm);}
        .rx-cart-item { background: var(--bg-surface); border: 1px solid var(--border-soft); padding: 1rem; border-radius: var(--radius-md); margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-sm);}
        .tool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        
        .tool-result { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); padding: 1.25rem; border-radius: var(--radius-md); color: var(--success); text-align: center; margin-top: 1rem; font-weight: 600;}
        .tool-result.danger { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); color: var(--danger); }
        .tool-result.warning { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); color: var(--warning); }
        .tool-result.neutral { background: var(--bg-body); border-color: var(--border-soft); color: var(--text-main); }

        .milestone-item { display: flex; gap: 1rem; padding: 0.75rem 0; align-items: flex-start; border-bottom: 1px solid var(--border-soft);}
        .milestone-text { font-size: 0.95rem; color: var(--text-main); line-height: 1.4;}
        .milestone-domain { font-size: 0.7rem; background: var(--border-soft); color: var(--text-main); padding: 3px 8px; border-radius: 99px; font-weight: 700; display: inline-block; margin-bottom: 4px; text-transform: uppercase; }

        .audit-card { padding: 1rem; border-radius: var(--radius-md); margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-soft); background: var(--bg-surface);}
        .status-pill { padding: 0.25rem 0.6rem; border-radius: 99px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;}
        .status-pill.overdue { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .status-pill.done { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .status-pill.upcoming { background: var(--primary-light); color: var(--primary); }

        .nis-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 1rem; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-soft);}
        .nis-table th, .nis-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border-soft);}
        .nis-table th { background-color: var(--primary-light); color: var(--primary); font-weight: 700;}
        body.dark-mode .nis-table th { background-color: #1e3a8a; color: #93c5fd;}
        
        .search-bar { width: 100%; padding: 10px; border: 1px solid var(--primary-light); border-radius: var(--radius-md); font-size: 0.95rem; margin-bottom: 1rem; box-sizing: border-box; background: var(--bg-surface); color: var(--text-main);}

        .mobile-toggle-btn { display: none; }

        @media (max-width: 768px) {
            .app-shell { display: flex; flex-direction: column; overflow: hidden; }
            header { padding: 1rem; flex-shrink:0; }
            .sidebar { padding: 0; height: auto; border-right: none; position: relative; z-index: 50; flex-shrink:0; overflow: visible;}
            
            /* Horizontal Scroll Nav for Mobile */
            .app-features-nav { display: flex; flex-direction: row; overflow-x: auto; padding: 0.75rem; gap: 0.5rem; background: var(--bg-surface); border-bottom: none; -webkit-overflow-scrolling: touch;}
            .app-features-nav::-webkit-scrollbar { display: none; }
            .feature-btn { white-space: nowrap; padding: 0.5rem 1rem; font-size: 0.85rem; border-radius: 99px; background: var(--bg-body); border: 1px solid var(--border-soft); flex: 0 0 auto; }
            .feature-btn.active { background: var(--primary); color: white; border: none;}
            
            .mobile-toggle-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 1rem; background: var(--primary-light); color: var(--primary-dark); font-weight: 700; border: none; border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); font-size: 0.9rem; cursor: pointer;}
            
            .panel { display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-surface); z-index: 100; max-height: 60vh; border-bottom: 1px solid var(--border-soft); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1rem;}
            .panel.mobile-open { display: block; }
            .panel-scroll { overflow-y: auto; padding-right: 0;}
            
            .main-content { padding: 1rem; flex: 1; overflow-y: auto; }
            .view-content { max-width: 100%; }
            .timeline-section { padding: 1rem; }
            .sub-tab-btn { font-size: 0.8rem; padding: 0.5rem; }
            .vaccine-row { grid-template-columns: 1fr; gap: 0.5rem; }
            .date-picker-cell { justify-content: flex-start; }
            .tick-box { position: absolute; right: 0.5rem; top: 1rem; }
        }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-surface); width: 90%; max-width: 500px; border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto; }
        .close-modal { float: right; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
        
        .checkbox-container { display: flex; align-items: center; gap: 8px; margin-top: 5px; background: var(--bg-surface); padding: 8px; border-radius: var(--radius-md); border: 1px solid var(--border-soft);}
        .checkbox-container input { width: 16px; height: 16px; margin: 0; }

        @media print {
            body > *:not(#printEngine) { display: none !important; }
            body { background: white !important; color: black !important; }
            #printEngine { display: block !important; width: 100%; color: black; }
            .print-header-container { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px;}
            .print-clinic-name { font-size: 20px; font-weight: bold; margin: 0; color: var(--primary); }
            .print-doc-name { font-size: 14px; font-weight: bold; margin: 0; }
            .print-tagline { font-size: 11px; color: #555; margin: 2px 0 0 0; }
            #printEngine h2, #printEngine h3 { color: black !important; border-bottom: 1px solid #ccc; padding-bottom: 4px; margin-top: 15px; }
            .page-break { page-break-after: always; }
            .vaccine-row { display: grid; grid-template-columns: 2fr 1fr; border-bottom: 1px solid #ccc; padding: 6px 0;}
            .date-picker-cell, .action-protocol-card { display: none !important; }
            .rx-pad { border: 2px solid #000; padding: 1.5rem; border-radius: 8px; margin-top: 1rem; }
            .rx-symbol { font-size: 2.5rem; font-weight: bold; line-height: 1; margin-bottom: 1rem; }
            .rx-dosage { font-size: 1.2rem; font-weight: bold; border-bottom: 1px dashed #ccc; padding-bottom: 4px; margin-bottom: 0.5rem;}
        }
    </style>
</head>
