<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pediatric Clinical Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --primary-light: #eff6ff; --accent: #0ea5e9; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --bg-body: #f8fafc; --text-main: #334155; --text-muted: #64748b; --border-soft: #e2e8f0; }
        body { font-family: sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 0; }
        .app-shell { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }
        .sidebar { background: #fff; padding: 20px; border-right: 1px solid var(--border-soft); }
        .main-content { padding: 20px; }
        .view-content { display: none; }
        .active-view { display: block; }
        .nis-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .nis-table th, .nis-table td { border: 1px solid var(--border-soft); padding: 8px; }
        button { cursor: pointer; padding: 10px; margin: 5px; }
        @media (max-width: 768px) { .app-shell { grid-template-columns: 1fr; } .sidebar { height: auto; } }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="sidebar">
        <h3>Menu</h3>
        <button onclick="switchMainFeature('trackerFeatureView', this)">📅 Tracker</button>
        <button onclick="switchMainFeature('dosageFeatureView', this)">💊 Dosage</button>
        <button onclick="switchMainFeature('nutritionFeatureView', this)">🍎 Nutrition</button>
        <div id="patientListContainer"></div>
    </div>
    
    <div class="main-content">
        <div id="trackerFeatureView" class="view-content active-view">
            <h2>Immunization Tracker</h2>
            <div id="timelineOutput"></div>
        </div>

        <div id="dosageFeatureView" class="view-content">
            <h2>Dosage Calculator</h2>
            <select id="drugCategory" onchange="populateDrugs(); calculateDose();">
                <option value="">-- Category --</option>
                <option value="antibiotics">Antibiotics</option>
                <option value="antipyretics">Antipyretics</option>
                <option value="antihistamines">Antihistamines</option>
                <option value="git">GIT Drugs</option>
                <option value="respiratory">Respiratory</option>
            </select>
            <select id="drugFormulation" onchange="calculateDose()"><option value="">-- Formulation --</option></select>
            <input type="number" id="calcWeight" placeholder="Weight (kg)" oninput="calculateDose()">
            <div id="calcOutputArea" style="margin-top:20px;"></div>
        </div>

        <div id="nutritionFeatureView" class="view-content">
            <h2>Nutrition</h2>
            <div id="nutriTargetArea"></div>
        </div>
    </div>
</div>

<script>
    // Databases must be defined BEFORE the functions that access them
    const drugDb = {
        "antibiotics": [{ name: "Amoxicillin 125mg/5ml", doseMg: 40, doseType: "perDay", div: 3, freq: "TID", conc: 125, vol: 5 }, { name: "Amox+Clav 156mg/5ml", doseMg: 40, doseType: "perDay", div: 3, freq: "TID", conc: 156, vol: 5 }],
        "antipyretics": [{ name: "Paracetamol 500 mg Tablet", doseMg: 15, doseType: "perDose", div: 1, freq: "QID", conc: 500, vol: 1 }, { name: "Paracetamol 650 mg Tablet", doseMg: 15, doseType: "perDose", div: 1, freq: "QID", conc: 650, vol: 1 }],
        "antihistamines": [{ name: "Cetirizine 5mg/5ml", doseMg: 0.25, doseType: "perDose", div: 1, freq: "QD", conc: 5, vol: 5 }],
        "git": [{ name: "Ondansetron 4mg/5ml", doseMg: 0.15, doseType: "perDose", div: 1, freq: "TID", conc: 4, vol: 5 }],
        "respiratory": [{ name: "Ascoril LS Junior", doseMg: 0, doseType: "fixed", div: 3, freq: "TID", conc: 0, vol: 5 }, { name: "Kuff-X Syrup", doseMg: 0, doseType: "fixed", div: 3, freq: "TID", conc: 0, vol: 5 }, { name: "Kuff-D Syrup", doseMg: 0, doseType: "fixed", div: 2, freq: "BID", conc: 0, vol: 5 }]
    };

    let customDrugsStore = JSON.parse(localStorage.getItem('custom_drugs')) || { "antibiotics": [], "antipyretics": [], "antihistamines": [], "git": [], "respiratory": [] };

    function populateDrugs() {
        const cat = document.getElementById('drugCategory').value;
        const formSelect = document.getElementById('drugFormulation');
        formSelect.innerHTML = '<option value="">-- Choose Formulation --</option>';
        if(cat && drugDb[cat]) {
            let combined = [...drugDb[cat], ...(customDrugsStore[cat] || [])];
            combined.forEach((drug, idx) => {
                formSelect.innerHTML += `<option value="${idx}">${drug.name}</option>`;
            });
        }
    }

    function calculateDose() {
        const weight = parseFloat(document.getElementById('calcWeight').value);
        const cat = document.getElementById('drugCategory').value;
        const drugIndex = document.getElementById('drugFormulation').value;
        const outputArea = document.getElementById('calcOutputArea');
        
        if(!weight || !cat || drugIndex === "") { outputArea.innerHTML = ""; return; }
        
        let combined = [...(drugDb[cat]||[]), ...(customDrugsStore[cat]||[])];
        const drug = combined[drugIndex];
        
        let vol = 0;
        if(drug.doseType === 'fixed') vol = drug.vol;
        else vol = ((drug.doseType === 'perDay' ? (weight * drug.doseMg) / drug.div : (weight * drug.doseMg)) * drug.vol) / drug.conc;
        
        outputArea.innerHTML = `<h3>Result: ${vol.toFixed(1)} ${drug.vol===1?'Unit':'mL'}</h3><p>Frequency: ${drug.freq}</p>`;
    }

    function switchMainFeature(viewId, el) {
        document.querySelectorAll('.view-content').forEach(vc => vc.classList.remove('active-view'));
        document.getElementById(viewId).classList.add('active-view');
    }
</script>
</body>
</html>
