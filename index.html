<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pediatric Clinical Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg-body: #f8fafc; --bg-surface: #ffffff; --text-main: #334155; --border-soft: #e2e8f0; }
        body { font-family: sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 0; }
        .app-shell { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
        .sidebar { background: var(--bg-surface); padding: 20px; border-right: 1px solid var(--border-soft); }
        .main-content { padding: 20px; }
        .view-content { display: none; }
        .view-content.active-view { display: block; }
        button { display: block; width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; border: none; border-radius: 6px; background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="sidebar">
        <h3>Menu</h3>
        <button onclick="switchMainFeature('trackerFeatureView', this)">📅 Tracker</button>
        <button onclick="switchMainFeature('dosageFeatureView', this)">💊 Dosage</button>
        <div id="patientListContainer"></div>
    </div>
    
    <div class="main-content">
        <div id="trackerFeatureView" class="view-content active-view">
            <h2>Immunization Tracker</h2>
            <div id="timelineOutput">Active</div>
        </div>
        <div id="dosageFeatureView" class="view-content">
            <h2>Dosage Calculator</h2>
            <select id="drugCategory" onchange="populateDrugs(); calculateDose();">
                <option value="">-- Choose Category --</option>
                <option value="antibiotics">Antibiotics</option>
            </select>
            <select id="drugFormulation" onchange="calculateDose()"><option value="">-- Choose Formulation --</option></select>
            <input type="number" id="calcWeight" placeholder="Weight (kg)" oninput="calculateDose()">
            <div id="calcOutputArea"></div>
        </div>
    </div>
</div>

<script>
    // Database
    const drugDb = {
        "antibiotics": [{ name: "Amoxicillin 125mg/5ml", doseMg: 40, doseType: "perDay", div: 3, freq: "TID", conc: 125, vol: 5 }]
    };

    // Load Routine
    window.onload = function() {
        console.log("System Initialized");
    };

    function populateDrugs() {
        const cat = document.getElementById('drugCategory').value;
        const formSelect = document.getElementById('drugFormulation');
        formSelect.innerHTML = '<option value="">-- Choose --</option>';
        if(cat && drugDb[cat]) {
            drugDb[cat].forEach((d, i) => {
                let o = document.createElement('option'); o.value = i; o.text = d.name; formSelect.add(o);
            });
        }
    }

    function calculateDose() {
        const w = parseFloat(document.getElementById('calcWeight').value);
        const c = document.getElementById('drugCategory').value;
        const idx = document.getElementById('drugFormulation').value;
        const out = document.getElementById('calcOutputArea');
        if(!w || !c || idx === "") { out.innerHTML = ""; return; }
        
        const d = drugDb[c][idx];
        let vol = ((d.doseType === 'perDay' ? (w * d.doseMg)/d.div : (w * d.doseMg)) * d.vol) / d.conc;
        out.innerHTML = `Result: ${vol.toFixed(1)} mL`;
    }

    function switchMainFeature(viewId, el) {
        document.querySelectorAll('.view-content').forEach(vc => vc.classList.remove('active-view'));
        document.getElementById(viewId).classList.add('active-view');
    }
</script>
</body>
</html>
